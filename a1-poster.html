<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fakekammer A1 poster</title>
  <link rel="icon" type="image/png" href="asset/poster_favicon.png">
  <link rel="stylesheet" href="a1-poster.css">
</head>
<body>
  <main class="poster-shell" aria-label="Fakekammer A1 poster maker">
    <section id="a1Poster" class="a1-poster" aria-label="A1 poster">
      <div id="posterField" class="poster-field">
        <div id="posterItems" class="poster-items"></div>
        <img class="poster-title-graphic" src="asset/poster_title.svg" alt="Fakekammer">
      </div>
    </section>
  </main>

  <div class="screen-actions" aria-hidden="false">
    <button id="printA1Btn" type="button">print A1 poster</button>
  </div>

  <script src="data.js"></script>
  <script src="a1-poster.js"></script>
</body>
</html>
